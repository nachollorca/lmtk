repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: no-commit-to-branch
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: .*jinja$
      - id: check-json
      - id: pretty-format-json
        args: [--autofix, --indent=4, --no-ensure-ascii]

  # Local hooks using just commands
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff Format
        entry: just format
        language: system
        types_or: [python, pyi, jupyter]
        pass_filenames: false

      - id: check-types
        name: Pyrefly Check
        entry: just check-types
        language: system
        types_or: [python, pyi, jupyter]
        types: [python]
        pass_filenames: false

      - id: analyze-complexity
        name: Complexipy Check
        entry: just analyze-complexity
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/verbicloud/check_commit_msg
    rev: v0.0.6
    hooks:
    - id: commit-msg-hook

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
